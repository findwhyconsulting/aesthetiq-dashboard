name: Update Dashboard Data

on:
  # schedule:
  #   - cron: '0 0 * * *'   # uncomment to re-enable daily schedule
  workflow_dispatch:        # manually trigger from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install BigQuery Python client
        run: pip install google-cloud-bigquery

      - name: Run all queries and export JSON files
        run: python scripts/run_queries.py

      - name: Commit and push updated data
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update dashboard data"
          git push
